    <title>Koora IPTV - Le Meilleur Fournisseur IPTV au Maroc</title>
    <meta name="description" content="Découvrez le meilleur service IPTV avec Koora IPTV. Plus de 15 000 chaînes, VOD, qualité 4K et support 24/7." />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-SG39L5ZDTL"></script>
    <script>
      (function (location) {
        if (location.search[1] === '/') {
          const decoded = location.search
            .slice(1)
            .split('&')
            .map((segment) => segment.replace(/~and~/g, '&'))
            .join('?');

          window.history.replaceState(
            null,
            '',
            decoded + location.hash,
          );
        }
      }(window.location));
    </script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag('js', new Date());
      gtag('config', 'G-SG39L5ZDTL');
    </script>
  </head>

    <div id="root"></div>

  </body>
