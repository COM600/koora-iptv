<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Koora IPTV</title>
    <script>
      const pathSegmentsToKeep = 0;
      const locationData = window.location;
      const redirectPath =
        locationData.protocol +
        '//' +
        locationData.hostname +
        (locationData.port ? ':' + locationData.port : '') +
        locationData.pathname
          .split('/')
          .slice(0, 1 + pathSegmentsToKeep)
          .join('/') +
        '/?/' +
        locationData.pathname
          .slice(1)
          .split('/')
          .slice(pathSegmentsToKeep)
          .join('/')
          .replace(/&/g, '~and~') +
        (locationData.search ? '&' + locationData.search.slice(1).replace(/&/g, '~and~') : '') +
        locationData.hash;

      window.location.replace(redirectPath);
    </script>
  </head>
  <body></body>
</html>
